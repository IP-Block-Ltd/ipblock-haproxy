# =============================================================================
# Example haproxy.cfg wiring the ip-block.com Lua action.
# Tested with HAProxy 3.4 LTS. Merge the relevant lines into your own config.
# =============================================================================

global
    log stdout format raw local0

    # --- ip-block.com configuration (exported to the Lua script) ---
    setenv IPB_ENABLED        1
    setenv IPB_SITE_ID        your-site-id
    setenv IPB_API_KEY        your-api-key
    setenv IPB_API_URL        https://api.ip-block.com/v1/check
    setenv IPB_FAIL_OPEN      1
    setenv IPB_CACHE_TTL      300
    setenv IPB_TIMEOUT_MS     1000
    setenv IPB_BEHIND_PROXY   0
    setenv IPB_REAL_IP_HEADER x-forwarded-for
    setenv IPB_WHITELIST      "127.0.0.1,::1"

    # The Lua httpclient uses HAProxy's internal HTTP client. To validate the
    # api.ip-block.com TLS certificate, point it at a CA bundle:
    httpclient.ssl.ca-file /etc/ssl/certs/ca-certificates.crt

    # Load the action script (registers action "ipblock_check").
    lua-load /etc/haproxy/ip-block/ip_block.lua

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend fe_main
    bind *:80

    # 1) Run the check. It sets txn.ipblock = "block" | "allow".
    http-request lua.ipblock_check

    # 2) Enforce the decision. Choose redirect OR deny (or both, redirect first).
    #    Option A: redirect blocked clients to the hosted block page.
    http-request redirect location https://www.ip-block.com/blocked.php if { var(txn.ipblock) -m str block }

    #    Option B: return a bare 403 (use instead of the redirect line above).
    #    http-request deny deny_status 403 if { var(txn.ipblock) -m str block }

    default_backend be_app

backend be_app
    server app1 127.0.0.1:8080
